name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-flight runs on the same ref when a new commit lands.
# For PRs, github.ref is refs/pull/N/merge (one group per PR).
# For main, github.ref is refs/heads/main; we don't cancel main runs.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  HUSKY: 0
  CI: true
  NEXT_TELEMETRY_DISABLED: 1
  DO_NOT_TRACK: 1
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  # `changes` runs first and decides whether the lint/test/build trio
  # actually needs to execute. We keep these gated rather than using a
  # workflow-level `paths-ignore` because that would skip the whole
  # workflow (including the umbrella `ci` job below), and the branch
  # protection rule requires `ci` to report a status -- a skipped
  # workflow never reports, so docs-only PRs would be unmergeable.
  # By gating per-job and always running the umbrella, the `ci` check
  # reports success even when the work jobs are skipped.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          # `code` is true when ANY file outside the listed patterns
          # changed. Inverse-match (`!`) means "fail this filter if
          # only listed files changed." Adjust this list when you add
          # new docs/config-only paths that genuinely shouldn't gate CI.
          filters: |
            code:
              - '!**/*.md'
              - '!.planning/**'
              - '!docs/**'
              - '!LICENSE'
              - '!.gitignore'
              - '!.vscode/**'

  lint:
    name: Lint
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: ./.github/actions/setup
      - run: bun run lint

  test:
    name: Test
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/test
      BETTER_AUTH_SECRET: test-secret-key-for-ci-minimum-32-chars
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      STRIPE_SECRET_KEY: sk_test_fake
      STRIPE_WEBHOOK_SECRET: whsec_test_fake
      BLOB_PRIVATE_READ_WRITE_TOKEN: vercel_blob_test_token
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: ./.github/actions/setup
      - run: bunx vitest run --reporter=dot

  build:
    name: Build
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://ci:ci@localhost:5432/ci' }}
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET || 'ci-build-secret-key-minimum-32-characters-long' }}
      BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL || 'http://localhost:3000' }}
      NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL || 'http://localhost:3000' }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY || 'sk_test_ci_build_dummy' }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET || 'whsec_ci_build_dummy' }}
      BLOB_PRIVATE_READ_WRITE_TOKEN: ${{ secrets.BLOB_PRIVATE_READ_WRITE_TOKEN || 'vercel_blob_ci_dummy_token' }}
      VERCEL_BLOB_READ_WRITE_TOKEN: ${{ secrets.VERCEL_BLOB_READ_WRITE_TOKEN || 'vercel_blob_ci_dummy_token' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: ./.github/actions/setup

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          # Key on dependency + config invalidators only. Source-content
          # invalidation is handled inside .next/cache by Turbopack.
          key: next-${{ runner.os }}-${{ hashFiles('bun.lock', 'next.config.ts', 'tsconfig.json', 'postcss.config.mjs') }}
          restore-keys: |
            next-${{ runner.os }}-

      - run: bun run build

  # Umbrella check that branch protection's "Required status check: ci"
  # rule waits on. `if: always()` makes it run even when the work jobs
  # are skipped (docs-only changes). The aggregation logic accepts
  # `success` and `skipped` but rejects `failure` and `cancelled`.
  #
  # Without this job, branch protection's required `ci` check is never
  # reported (the underlying jobs are named lint/test/build) and every
  # push gets the `Bypassed rule violations` message -- which is what
  # iteration 8 surfaced.
  ci:
    name: ci
    needs: [changes, lint, test, build]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Aggregate job results
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          LINT_RESULT: ${{ needs.lint.result }}
          TEST_RESULT: ${{ needs.test.result }}
          BUILD_RESULT: ${{ needs.build.result }}
        run: |
          set -euo pipefail
          fail=0
          for pair in \
            "changes:$CHANGES_RESULT" \
            "lint:$LINT_RESULT" \
            "test:$TEST_RESULT" \
            "build:$BUILD_RESULT"
          do
            name="${pair%%:*}"
            result="${pair#*:}"
            case "$result" in
              success|skipped)
                echo "  ✓ $name: $result"
                ;;
              *)
                echo "::error::$name reported $result"
                fail=1
                ;;
            esac
          done
          if [ "$fail" -ne 0 ]; then
            exit 1
          fi
          echo "All required jobs succeeded or were intentionally skipped."
