name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '.planning/**'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.vscode/**'
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '.planning/**'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.vscode/**'

# Cancel in-flight runs on the same ref when a new commit lands.
# For PRs, github.ref is refs/pull/N/merge (one group per PR).
# For main, github.ref is refs/heads/main; we don't cancel main runs.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  HUSKY: 0
  CI: true
  NEXT_TELEMETRY_DISABLED: 1
  DO_NOT_TRACK: 1
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: ./.github/actions/setup
      - run: bun run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/test
      BETTER_AUTH_SECRET: test-secret-key-for-ci-minimum-32-chars
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      STRIPE_SECRET_KEY: sk_test_fake
      STRIPE_WEBHOOK_SECRET: whsec_test_fake
      BLOB_PRIVATE_READ_WRITE_TOKEN: vercel_blob_test_token
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: ./.github/actions/setup
      - run: bunx vitest run --reporter=dot

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://ci:ci@localhost:5432/ci' }}
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET || 'ci-build-secret-key-minimum-32-characters-long' }}
      BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL || 'http://localhost:3000' }}
      NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL || 'http://localhost:3000' }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY || 'sk_test_ci_build_dummy' }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET || 'whsec_ci_build_dummy' }}
      BLOB_PRIVATE_READ_WRITE_TOKEN: ${{ secrets.BLOB_PRIVATE_READ_WRITE_TOKEN || 'vercel_blob_ci_dummy_token' }}
      VERCEL_BLOB_READ_WRITE_TOKEN: ${{ secrets.VERCEL_BLOB_READ_WRITE_TOKEN || 'vercel_blob_ci_dummy_token' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: ./.github/actions/setup

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          # Key on dependency + config invalidators only. Source-content
          # invalidation is handled inside .next/cache by Turbopack.
          key: next-${{ runner.os }}-${{ hashFiles('bun.lock', 'next.config.ts', 'tsconfig.json', 'postcss.config.mjs') }}
          restore-keys: |
            next-${{ runner.os }}-

      - run: bun run build
