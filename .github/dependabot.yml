# Dependabot configuration. Auto-opens PRs for outdated dependencies
# (with a CVE bias for security updates). Reference:
# https://docs.github.com/en/code-security/dependabot/working-with-dependabot/dependabot-options-reference
#
# Strategy: aggressive grouping + auto-merge.
#
#   - Dev-deps minor+patch  -> one weekly grouped PR -> auto-merged
#     by .github/workflows/dependabot-auto-merge.yml.
#   - Prod-deps patch       -> one weekly grouped PR -> auto-merged.
#   - Prod-deps minor       -> one weekly grouped PR -> human review
#     required (auto-merge workflow skips minor for prod).
#   - Anything major (any ecosystem, any dep type) -> individual PR
#     with no group, human review required.
#   - Security updates fast-track via the always-on
#     `security-updates` channel, independent of the schedule.
#
# This converges to ~1-3 review-worthy PRs per week instead of the
# 10+ individual bumps that the original config generated.

version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: America/Chicago
    open-pull-requests-limit: 10
    versioning-strategy: increase
    labels:
      - dependencies
      - npm
    groups:
      # Dev-deps: bundle every minor + patch bump into one PR. The
      # auto-merge workflow merges it automatically once CI passes,
      # since dev-deps don't ship to production.
      development-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      # Prod-deps patch: bundle and auto-merge. Patch bumps are
      # contractually backward-compatible per semver and the practical
      # risk is low (CVE patches, doc-only fixes, internal refactors).
      production-patches:
        dependency-type: production
        update-types:
          - patch
      # Prod-deps minor: bundle but do NOT auto-merge. Minor bumps can
      # technically introduce non-breaking new behavior that needs a
      # human eye -- new defaults, deprecation notices, perf shifts.
      production-minor:
        dependency-type: production
        update-types:
          - minor
      # Major bumps (any dep type) deliberately have no group catching
      # them, so each lands as an individual PR. Majors require
      # reading release notes + adapting code; bundling them into a
      # group would obscure that.

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: America/Chicago
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    # Single grouped PR per week so action bumps don't fan out.
    # Auto-merge workflow handles minor+patch; majors stay individual.
    groups:
      actions:
        patterns:
          - '*'
        update-types:
          - minor
          - patch
